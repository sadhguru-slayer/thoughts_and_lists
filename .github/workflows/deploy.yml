name: Deploy to OCI

on:
  push:
    branches:
      - master # or main, depending on your default branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Oracle Cloud VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            # 1. Navigate into the git repository folder
            cd ~/thoughts_and_lists

            # 2. Force the server to match GitHub (discards local edits on the server)
            git fetch --all
            git reset --hard origin/master

            # 3. Navigate into the backend folder where docker-compose is located
            cd backend

            # 4. Build and restart the docker containers
            docker compose -f docker-compose.dev.yaml up -d --build
